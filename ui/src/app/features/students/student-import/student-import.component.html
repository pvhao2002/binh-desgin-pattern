<div class="page">
  <div class="page-header">
    <h1 class="page-title">Import Students</h1>
  </div>
  <p style="margin-bottom: 1rem; color: var(--color-text-muted);">Upload a CSV with header: <strong>fullName, classId,
      email</strong></p>

  <form class="import-form">
    <div class="form-group">
      <input type="file" accept=".csv,.txt" (change)="onFileSelected($event)" />
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-primary" (click)="import()"
        [disabled]="!selectedFile() || importing()">Import</button>
      <a routerLink="/students" class="btn">Cancel</a>
    </div>
  </form>
  @if (result(); as r) {
  <div class="result" [class.error]="!r.success">
    @if (r.success) { <p>Imported {{ r.count }} students.</p> }
    @if (r.errors.length) {
    <ul>
      @for (e of r.errors; track e) { <li>{{ e }}</li> }
    </ul>
    }
  </div>
  }
  @if (importing()) { <p>Importing...</p> }
</div>
