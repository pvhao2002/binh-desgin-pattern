<div class="page">
  <h1>{{ isEdit() ? 'Edit Class' : 'New Class' }}</h1>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="field"><label>Class Name</label><input formControlName="className" /></div>
    <div class="field"><label>Course Year</label><input formControlName="courseYear" /></div>
    <div class="field"><label>Department</label>
      <select formControlName="departmentId">
        <option value="">-- Select --</option>
        @for (d of departments(); track d.departmentId) { <option [value]="d.departmentId">{{ d.departmentName }}</option> }
      </select>
    </div>
    <div class="actions"><button type="submit" class="btn btn-primary" [disabled]="form.invalid">Save</button><a routerLink="/classes" class="btn">Cancel</a></div>
  </form>
</div>
