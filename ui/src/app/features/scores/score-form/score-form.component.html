<div class="page">
  <h1>{{ isEdit() ? 'Edit Score' : 'New Score' }}</h1>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="field"><label>Student</label>
      <select formControlName="studentId"><option value="">-- Select --</option>
        @for (s of students(); track s.studentId) { <option [value]="s.studentId">{{ s.fullName }} ({{ s.className }})</option> }
      </select>
    </div>
    <div class="field"><label>Course Class</label>
      <select formControlName="courseClassId"><option value="">-- Select --</option>
        @for (c of courseClasses(); track c.courseClassId) { <option [value]="c.courseClassId">{{ c.subjectName }} - {{ c.className }}</option> }
      </select>
    </div>
    <div class="field"><label>Continuous Assessment Score</label><input formControlName="continuousAssessmentScore" type="number" step="0.01" /></div>
    <div class="field"><label>Final Exam Score</label><input formControlName="finalExamScore" type="number" step="0.01" /></div>
    <div class="actions"><button type="submit" class="btn btn-primary" [disabled]="form.invalid">Save</button><a routerLink="/scores" class="btn">Cancel</a></div>
  </form>
</div>
